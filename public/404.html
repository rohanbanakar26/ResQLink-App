<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ResQLink Redirecting...</title>
    <script type="text/javascript">
      // GitHub Pages SPA Hero Script
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <div style="font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; color: #666;">
       <div style="width: 40px; height: 40px; border: 4px solid #eee; border-top-color: #f43f5e; border-radius: 50%; animation: spin 1s linear infinite;"></div>
       <p style="margin-top: 20px; font-weight: bold;">Loading ResQLink...</p>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  </body>
</html>
