<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ResQLink</title>
    <script>
      // GitHub Pages SPA redirect: capture the current URL path + query string
      // and store it so index.html can restore it after React Router mounts.
      // See: https://github.com/rafgraph/spa-github-pages
      var segmentCount = 1; // equals the number of path segments in the repo name (1 for /ResQLink-App/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') +
        '/?p=/' + l.pathname.slice(1 + segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
      var pathSegments = l.pathname.split('/').slice(0, 1 + segmentCount);
      var redirectPath = '/' + l.pathname.slice(pathSegments.join('/').length + 1);
      sessionStorage.setItem('spa-redirect', redirectPath + l.search + l.hash);
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        pathSegments.join('/') + '/');
    </script>
  </head>
  <body></body>
</html>
